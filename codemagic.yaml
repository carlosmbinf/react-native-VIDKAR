workflows:
  expo_android_internal:
    name: Expo Android (AAB + Internal Testing)

    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: master
    #       include: true

    environment:
      android_signing:
        - keystore_reference
      groups:
        - google_credentials
        - vidkar
      node: 22
      java: 17

    cache:
      cache_paths:
        - node_modules
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Clean yarn
        script: |
          rm -rf .yarn yarn.lock

      - name: Install deps
        script: |
          npm install --legacy-peer-deps

      - name: Clean android
        script: |
          rm -rf android

      - name: Expo prebuild
        script: |
          npx expo prebuild --platform android

      - name: Set versionCode & versionName
        script: |
          cd android/app

          BUILD_NUMBER=${PROJECT_BUILD_NUMBER:-0}
          VERSION_CODE=$((532 + BUILD_NUMBER))

          VERSION_NAME="4.0.$VERSION_CODE"

          echo "Build number: $BUILD_NUMBER"
          echo "Version code: $VERSION_CODE"
          echo "Version name: $VERSION_NAME"

          perl -pi -e "s/versionCode\s+\d+/versionCode $VERSION_CODE/g" build.gradle
          perl -pi -e "s/versionName\s+\"[^\"]+\"/versionName \"$VERSION_NAME\"/g" build.gradle

      - name: Build AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

      email:
        recipients:
          - "carlosmbinf@gmail.com"
        notify:
          success: true
          failure: true

  expo_ios_internal:
    name: Expo iOS (TestFlight)

    max_build_duration: 120
    instance_type: mac_mini_m2

    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: master
    #       include: true

    integrations:
      app_store_connect: "VidkarAPIKey"

    environment:
      ios_signing:
        provisioning_profiles:
          - expo_profile
          - expo_profile_watchkitapp
        certificates:
          - com.vidkar_distribution_certificates
      groups:
        - vidkar
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.vidkar"
        WATCH_BUNDLE_ID: "com.vidkar.watchkitapp"
        XCODE_WORKSPACE: "Vidkar.xcworkspace"
        XCODE_SCHEME: "Vidkar"

    cache:
      cache_paths:
        - node_modules
        - ios/Pods
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Clean yarn
        script: |
          rm -rf .yarn yarn.lock

      - name: Install deps
        script: |
          npm install --legacy-peer-deps

      - name: Clean ios
        script: |
          rm -rf ios

      - name: Expo prebuild (iOS)
        script: |
          npx expo prebuild --platform ios

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      # 🔥 VERSIONADO IGUAL QUE ANDROID
      - name: Set iOS version
        script: |
          cd ios

          BUILD_NUMBER=${PROJECT_BUILD_NUMBER:-0}
          VERSION_CODE=$((532 + BUILD_NUMBER))
          VERSION_NAME="4.0.$VERSION_CODE"

          echo "Version: $VERSION_NAME"
          echo "Build: $VERSION_CODE"

          # Detectar ruta correcta automáticamente
          INFO_PLIST=$(find . -name "Info.plist" | grep -E "Runner|Vidkar" | head -n 1)

          echo "Usando plist: $INFO_PLIST"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION_NAME" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION_CODE" "$INFO_PLIST"

      # 🔐 Aplicar perfiles/certificados ya resueltos por Codemagic
      - name: Setup signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      # beta_groups:
      #   - group PruebasVidkar

      email:
        recipients:
          - "carlosmbinf@gmail.com"
        notify:
          success: true
          failure: true

  expo_full_release:
    name: Expo Full Release (Android + iOS)

    instance_type: mac_mini_m2

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "release-*"
          include: true

    integrations:
      app_store_connect: "VidkarAPIKey"

    environment:
      android_signing:
        - keystore_reference
      ios_signing:
        provisioning_profiles:
          - expo_profile
          - expo_profile_watchkitapp
        certificates:
          - com.vidkar_distribution_certificates
      groups:
        - google_credentials
        - vidkar
      node: 22
      java: 17
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.vidkar"
        WATCH_BUNDLE_ID: "com.vidkar.watchkitapp"
        XCODE_WORKSPACE: "Vidkar.xcworkspace"
        XCODE_SCHEME: "Vidkar"

    cache:
      cache_paths:
        - node_modules
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - ios/Pods
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Clean yarn
        script: |
          rm -rf .yarn yarn.lock

      - name: Install deps
        script: |
          npm install --legacy-peer-deps

      # ── ANDROID ────────────────────────────────────────────────────
      - name: Clean android
        script: |
          rm -rf android

      - name: Expo prebuild (Android)
        script: |
          npx expo prebuild --platform android

      - name: Set Android versionCode & versionName
        script: |
          cd android/app

          BUILD_NUMBER=${PROJECT_BUILD_NUMBER:-0}
          VERSION_CODE=$((532 + BUILD_NUMBER))
          VERSION_NAME="4.0.$VERSION_CODE"

          echo "Android Build number: $BUILD_NUMBER"
          echo "Android Version code: $VERSION_CODE"
          echo "Android Version name: $VERSION_NAME"

          perl -pi -e "s/versionCode\s+\d+/versionCode $VERSION_CODE/g" build.gradle
          perl -pi -e "s/versionName\s+\"[^\"]+\"/versionName \"$VERSION_NAME\"/g" build.gradle

      - name: Build AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      # ── iOS ────────────────────────────────────────────────────────
      - name: Clean ios
        script: |
          rm -rf ios

      - name: Expo prebuild (iOS)
        script: |
          npx expo prebuild --platform ios

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Set iOS version
        script: |
          cd ios

          BUILD_NUMBER=${PROJECT_BUILD_NUMBER:-0}
          VERSION_CODE=$((532 + BUILD_NUMBER))
          VERSION_NAME="4.0.$VERSION_CODE"

          echo "iOS Version: $VERSION_NAME"
          echo "iOS Build: $VERSION_CODE"

          INFO_PLIST=$(find . -name "Info.plist" | grep -E "Runner|Vidkar" | head -n 1)

          echo "Usando plist: $INFO_PLIST"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION_NAME" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION_CODE" "$INFO_PLIST"

      - name: Setup signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - android/app/build/outputs/**/*.aab
      - build/ios/ipa/*.ipa

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - "carlosmbinf@gmail.com"
        notify:
          success: true
          failure: true
