workflows:
  expo_android_internal:
    name: Expo Android (AAB + Internal Testing)

    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: master
    #       include: true

    environment:
      android_signing:
        - keystore_reference
      groups:
        - google_credentials
        - vidkar
      node: 22
      java: 17

    cache:
      cache_paths:
        - node_modules
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Clean yarn
        script: |
          rm -rf .yarn yarn.lock

      - name: Install deps
        script: |
          npm install --legacy-peer-deps

      - name: Clean android
        script: |
          rm -rf android

      - name: Expo prebuild
        script: |
          npx expo prebuild --platform android

      - name: Set versionCode & versionName
        script: |
          cd android/app

          BUILD_NUMBER=${PROJECT_BUILD_NUMBER:-0}
          VERSION_CODE=$((532 + BUILD_NUMBER))

          VERSION_NAME="4.0.$VERSION_CODE"

          echo "Build number: $BUILD_NUMBER"
          echo "Version code: $VERSION_CODE"
          echo "Version name: $VERSION_NAME"

          perl -pi -e "s/versionCode\s+\d+/versionCode $VERSION_CODE/g" build.gradle
          perl -pi -e "s/versionName\s+\"[^\"]+\"/versionName \"$VERSION_NAME\"/g" build.gradle

      - name: Build AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

      email:
        recipients:
          - "carlosmbinf@gmail.com"
        notify:
          success: true
          failure: true

  expo_ios_internal:
    name: Expo iOS (TestFlight)

    max_build_duration: 120
    instance_type: mac_mini_m2

    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: master
    #       include: true

    integrations:
      app_store_connect: "VidkarAPIKey"

    environment:
      ios_signing:
        provisioning_profiles:
          - expo_profile
          - expo_profile_watchkitapp
        certificates:
          - com.vidkar_distribution_certificates
          - com.vidkar.watchkitapp_distribution_certificates
      groups:
        - vidkar
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.vidkar"
        WATCH_BUNDLE_ID: "com.vidkar.watchkitapp"
        XCODE_WORKSPACE: "Vidkar.xcworkspace"
        XCODE_SCHEME: "Vidkar"

    cache:
      cache_paths:
        - node_modules
        - ios/Pods
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Clean yarn
        script: |
          rm -rf .yarn yarn.lock

      - name: Install deps
        script: |
          npm install --legacy-peer-deps

      - name: Clean ios
        script: |
          rm -rf ios

      - name: Expo prebuild (iOS)
        script: |
          npx expo prebuild --platform ios

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      # 🔥 VERSIONADO IGUAL QUE ANDROID
      - name: Set iOS version
        script: |
          cd ios

          BUILD_NUMBER=${PROJECT_BUILD_NUMBER:-0}
          VERSION_CODE=$((532 + BUILD_NUMBER))
          VERSION_NAME="4.0.$VERSION_CODE"

          echo "Version: $VERSION_NAME"
          echo "Build: $VERSION_CODE"

          # Mantener app iOS y Watch app con la misma version/build.
          INFO_PLISTS=(
            "Vidkar/Info.plist"
            "VidkarWatch/Info.plist"
          )

          for INFO_PLIST in "${INFO_PLISTS[@]}"; do
            if [ -f "$INFO_PLIST" ]; then
              echo "Actualizando plist: $INFO_PLIST"
              /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION_NAME" "$INFO_PLIST"
              /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION_CODE" "$INFO_PLIST"
            else
              echo "No existe $INFO_PLIST, se omite"
            fi
          done

      # 🔐 Aplicar perfiles/certificados ya resueltos por Codemagic
      - name: Setup signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          set -euo pipefail

          BUILD_ROOT="${CM_BUILD_DIR:-$PWD}/build/ios"
          ARCHIVE_PATH="$BUILD_ROOT/xcarchive/Vidkar.xcarchive"
          DERIVED_DATA_PATH="$BUILD_ROOT/DerivedData"
          IPA_DIR="$BUILD_ROOT/ipa"
          LOG_DIR="$BUILD_ROOT/logs"
          EXPORT_OPTIONS_PLIST="/Users/builder/export_options.plist"
          TEAM_ID="${APPLE_TEAM_ID:-4TWB6RN383}"

          rm -rf "$ARCHIVE_PATH" "$DERIVED_DATA_PATH"
          mkdir -p "$BUILD_ROOT/xcarchive" "$DERIVED_DATA_PATH" "$IPA_DIR" "$LOG_DIR"

          if [ ! -f "$EXPORT_OPTIONS_PLIST" ]; then
            echo "No existe $EXPORT_OPTIONS_PLIST. El paso 'Setup signing' no genero export options."
            exit 1
          fi

          xcodebuild \
            -workspace "ios/$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual 2>&1 | tee "$LOG_DIR/xcodebuild-archive.log"

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -exportPath "$IPA_DIR" 2>&1 | tee "$LOG_DIR/xcodebuild-export.log"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      # beta_groups:
      #   - group PruebasVidkar

      email:
        recipients:
          - "carlosmbinf@gmail.com"
        notify:
          success: true
          failure: true

  expo_full_release:
    name: Expo Full Release (Android + iOS)

    instance_type: mac_mini_m2

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "release-*"
