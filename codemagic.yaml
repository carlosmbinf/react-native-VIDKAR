workflows:
  expo_android_internal:
    name: Expo Android (AAB + Internal Testing)

    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: master
    #       include: true

    environment:
      android_signing:
        - keystore_reference
      groups:
        - google_credentials
        - vidkar
      node: 22
      java: 17

    cache:
      cache_paths:
        - node_modules
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Clean yarn
        script: |
          rm -rf .yarn yarn.lock

      - name: Install deps
        script: |
          npm install --legacy-peer-deps

      - name: Clean android
        script: |
          rm -rf android

      - name: Expo prebuild
        script: |
          npx expo prebuild --platform android

      - name: Set versionCode & versionName
        script: |
          cd android/app

          BUILD_NUMBER=${PROJECT_BUILD_NUMBER:-0}
          VERSION_CODE=$((532 + BUILD_NUMBER))

          VERSION_NAME="4.0.$VERSION_CODE"

          echo "Build number: $BUILD_NUMBER"
          echo "Version code: $VERSION_CODE"
          echo "Version name: $VERSION_NAME"

          perl -pi -e "s/versionCode\s+\d+/versionCode $VERSION_CODE/g" build.gradle
          perl -pi -e "s/versionName\s+\"[^\"]+\"/versionName \"$VERSION_NAME\"/g" build.gradle

      - name: Build AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

      email:
        recipients:
          - "carlosmbinf@gmail.com"
        notify:
          success: true
          failure: true

  expo_ios_internal:
    name: Expo iOS (TestFlight)

    max_build_duration: 120
    instance_type: mac_mini_m2

    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: master
    #       include: true

    integrations:
      app_store_connect: "VidkarAPIKey"

    environment:
      ios_signing:
        provisioning_profiles:
          - expo_profile
          - expo_profile_watchkitapp
        certificates:
          - com.vidkar_distribution_certificates
      groups:
        - vidkar
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.vidkar"
        WATCH_BUNDLE_ID: "com.vidkar.watchkitapp"
        XCODE_WORKSPACE: "Vidkar.xcworkspace"
        XCODE_SCHEME: "Vidkar"

    cache:
      cache_paths:
        - node_modules
        - ios/Pods
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Clean yarn
        script: |
          rm -rf .yarn yarn.lock

      - name: Install deps
        script: |
          npm install --legacy-peer-deps

      - name: Clean ios
        script: |
          rm -rf ios

      - name: Expo prebuild (iOS)
        script: |
          npx expo prebuild --platform ios

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      # 🔥 VERSIONADO IGUAL QUE ANDROID
      - name: Set iOS version
        script: |
          cd ios

          BUILD_NUMBER=${PROJECT_BUILD_NUMBER:-0}
          VERSION_CODE=$((532 + BUILD_NUMBER))
          VERSION_NAME="4.0.$VERSION_CODE"

          echo "Version: $VERSION_NAME"
          echo "Build: $VERSION_CODE"

          # Mantener app iOS y Watch app con la misma version/build.
          INFO_PLISTS=(
            "Vidkar/Info.plist"
            "VidkarWatch/Info.plist"
          )

          for INFO_PLIST in "${INFO_PLISTS[@]}"; do
            if [ -f "$INFO_PLIST" ]; then
              echo "Actualizando plist: $INFO_PLIST"
              /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION_NAME" "$INFO_PLIST"
              /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION_CODE" "$INFO_PLIST"
            else
              echo "No existe $INFO_PLIST, se omite"
            fi
          done

      # 🔐 Aplicar perfiles/certificados ya resueltos por Codemagic
      - name: Setup signing
        script: |
          xcode-project use-profiles

      - name: Normalize signing for app and Watch
        script: |
          set -euo pipefail

          PROJECT_PATH="ios/Vidkar.xcodeproj"
          EXPORT_OPTIONS_PLIST="/Users/builder/export_options.plist"
          TEAM_ID="${APPLE_TEAM_ID:-4TWB6RN383}"

          if [ ! -f "$EXPORT_OPTIONS_PLIST" ]; then
            echo "No existe $EXPORT_OPTIONS_PLIST tras 'xcode-project use-profiles'."
            exit 1
          fi

          APP_PROFILE_NAME="$(/usr/libexec/PlistBuddy -c "Print :provisioningProfiles:$BUNDLE_ID" "$EXPORT_OPTIONS_PLIST")"
          WATCH_PROFILE_NAME="$(/usr/libexec/PlistBuddy -c "Print :provisioningProfiles:$WATCH_BUNDLE_ID" "$EXPORT_OPTIONS_PLIST")"

          if [ -z "$APP_PROFILE_NAME" ] || [ -z "$WATCH_PROFILE_NAME" ]; then
            echo "No se pudieron resolver los perfiles desde export_options.plist"
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Set :signingStyle automatic" "$EXPORT_OPTIONS_PLIST" || \
            /usr/libexec/PlistBuddy -c "Add :signingStyle string automatic" "$EXPORT_OPTIONS_PLIST"
          /usr/libexec/PlistBuddy -c "Delete :provisioningProfiles:$WATCH_BUNDLE_ID" "$EXPORT_OPTIONS_PLIST" || true

          export PROJECT_PATH TEAM_ID APP_PROFILE_NAME WATCH_PROFILE_NAME

          ruby <<'RUBY'
          begin
            require 'xcodeproj'
          rescue LoadError
            system('gem install xcodeproj --no-document') or abort('No se pudo instalar xcodeproj')
            require 'xcodeproj'
          end

          project = Xcodeproj::Project.open(ENV.fetch('PROJECT_PATH'))
          root_attributes = project.root_object.attributes ||= {}
          target_attributes = root_attributes['TargetAttributes'] ||= {}

          project.targets.each do |target|
            target_attributes[target.uuid] ||= {}

            case target.name
            when 'Vidkar'
              profile_name = ENV.fetch('APP_PROFILE_NAME')
              target_attributes[target.uuid]['ProvisioningStyle'] = 'Manual'

              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                config.build_settings['DEVELOPMENT_TEAM'] = ENV.fetch('TEAM_ID')
                config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = profile_name
                config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]'] = profile_name
              end
            when 'VidkarWatch'
              target_attributes[target.uuid]['ProvisioningStyle'] = 'Automatic'

              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGN_STYLE'] = 'Automatic'
                config.build_settings['DEVELOPMENT_TEAM'] = ENV.fetch('TEAM_ID')
                %w[
                  CODE_SIGN_IDENTITY
                  PROVISIONING_PROFILE_SPECIFIER
                  CODE_SIGN_IDENTITY[sdk=iphoneos*]
                  PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]
                  CODE_SIGN_IDENTITY[sdk=watchos*]
                  PROVISIONING_PROFILE_SPECIFIER[sdk=watchos*]
                ].each { |key| config.build_settings.delete(key) }
              end
            end
          end

          project.save
          RUBY

      - name: Debug resolved signing
        script: |
          set -euo pipefail

          xcodebuild \
            -workspace "ios/$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -showBuildSettings 2>/dev/null | \
            awk '
              /TARGETNAME = / { target=$3 }
              /PRODUCT_BUNDLE_IDENTIFIER = / { bundle=$3 }
              /CODE_SIGN_STYLE = / { signStyle=$3 }
              /DEVELOPMENT_TEAM = / { team=$3 }
              /PROVISIONING_PROFILE_SPECIFIER = / { profile=substr($0, index($0,$3)) }
              /CODE_SIGN_IDENTITY = / {
                identity=substr($0, index($0,$3));
                print "TARGET=" target " | BUNDLE=" bundle " | STYLE=" signStyle " | TEAM=" team " | PROFILE=" profile " | IDENTITY=" identity;
                bundle=""; signStyle=""; team=""; profile=""; identity="";
              }
            '

      - name: Build IPA
        script: |
          set -euo pipefail

          BUILD_ROOT="${CM_BUILD_DIR:-$PWD}/build/ios"
          ARCHIVE_PATH="$BUILD_ROOT/xcarchive/Vidkar.xcarchive"
          DERIVED_DATA_PATH="$BUILD_ROOT/DerivedData"
          IPA_DIR="$BUILD_ROOT/ipa"
          LOG_DIR="$BUILD_ROOT/logs"
          EXPORT_OPTIONS_PLIST="/Users/builder/export_options.plist"
          TEAM_ID="${APPLE_TEAM_ID:-4TWB6RN383}"

          rm -rf "$ARCHIVE_PATH" "$DERIVED_DATA_PATH"
          mkdir -p "$BUILD_ROOT/xcarchive" "$DERIVED_DATA_PATH" "$IPA_DIR" "$LOG_DIR"

          if [ ! -f "$EXPORT_OPTIONS_PLIST" ]; then
            echo "No existe $EXPORT_OPTIONS_PLIST. El paso 'Setup signing' no genero export options."
            exit 1
          fi

          xcodebuild \
            -workspace "ios/$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM="$TEAM_ID" 2>&1 | tee "$LOG_DIR/xcodebuild-archive.log"

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -exportPath "$IPA_DIR" 2>&1 | tee "$LOG_DIR/xcodebuild-export.log"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      # beta_groups:
      #   - group PruebasVidkar

      email:
        recipients:
          - "carlosmbinf@gmail.com"
        notify:
          success: true
          failure: true

  expo_full_release:
