workflows:
  expo_android_internal:
    name: Expo Android (AAB + Internal Testing)

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    environment:
      android_signing:
        - keystore_reference
      groups:
        - google_credentials
        - vidkar
      node: 22
      java: 17

    cache:
      cache_paths:
        - node_modules
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Clean yarn
        script: |
          rm -rf .yarn yarn.lock

      - name: Install deps
        script: |
          npm install --legacy-peer-deps

      - name: Clean android
        script: |
          rm -rf android

      - name: Expo prebuild
        script: |
          npx expo prebuild --platform android

      - name: Fix signingConfig (CRÍTICO)
        script: |
          cd android/app

          # Reemplazar cualquier uso incorrecto de variables
          sed -i '' 's/file(".*CM_KEYSTORE_PATH.*")/file(System.getenv("CM_KEYSTORE_PATH"))/g' build.gradle || true
          sed -i '' 's/"\$CM_KEYSTORE_PATH"/System.getenv("CM_KEYSTORE_PATH")/g' build.gradle || true

      - name: Set versionCode
        script: |
          cd android/app
          perl -pi -e "s/versionCode\s+\d+/versionCode $PROJECT_BUILD_NUMBER/g" build.gradle

      - name: Build AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

      email:
        recipients:
          - "carlosmbinf@gmail.com"
        notify:
          success: true
          failure: true
